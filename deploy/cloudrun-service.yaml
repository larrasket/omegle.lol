# Cloud Run service template for omegle.lol backend.
#
# Important constraint: the matcher is in-memory. Every user lives on whichever
# instance terminated their WebSocket — users on different instances will
# never be paired. Until Phase 3 (Redis-backed matcher), this service MUST
# run as a single instance:
#
#     min_instances == max_instances == 1
#
# Cloud Run will queue new TCP connections behind the single instance.
# At ~1k concurrent connections that's fine (each connection is 3 goroutines
# + ~5 KB of session state). Past that the matcher's O(n²) scan under a
# global lock starts to bite — see docs/superpowers/specs/2026-05-25-…
# §13.2 for the scaling cliff.
#
# Apply with:
#   gcloud run services replace deploy/cloudrun-service.yaml \
#     --region=<REGION> --project=<PROJECT>
#
# Or use this as a reference and configure via Terraform / Cloud Deploy.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: omegle-backend
spec:
  template:
    metadata:
      annotations:
        # Pin Gen2 for HTTP-based liveness/startup probes and faster cold
        # start. (Annotation lives on Revision metadata, not Service.)
        run.googleapis.com/execution-environment: gen2

        # Single instance — see header. Both bounds are 1.
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '1'

        # CPU always allocated so the background matcher goroutine + heartbeat
        # ticker keep running between requests. The default "CPU only during
        # request" would freeze them.
        run.googleapis.com/cpu-throttling: 'false'

        # Sessions are sticky to instances by definition (each one terminates
        # a long-lived WS). Cloud Run honours WS-affinity at the LB layer
        # automatically when min==max==1, but we set it explicitly for clarity.
        run.googleapis.com/sessionAffinity: 'true'
    spec:
      containerConcurrency: 1000        # 1k concurrent WS per instance
      timeoutSeconds: 3600              # 1 h max WS-request budget
      containers:
        - image: REGION-docker.pkg.dev/PROJECT/REGISTRY/omegle-backend:TAG
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: info
            - name: ALLOWED_ORIGINS
              # MUST be the exact production origin. No wildcards in prod.
              value: https://omegle.lol
            - name: TRUSTED_PROXY_DEPTH
              # 1 = direct Cloud Run (Google's frontend appends client IP).
              # 2 = Cloud Run behind a Cloud Load Balancer.
              value: '1'
            - name: SHUTDOWN_TIMEOUT_MS
              value: '8000'
            - name: MATCH_TIMEOUT_MS
              value: '8000'
            - name: HEARTBEAT_INTERVAL_MS
              value: '25000'
            - name: HEARTBEAT_TIMEOUT_MS
              value: '10000'
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
