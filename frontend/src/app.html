<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#0891b2" />
		<meta
			name="description"
			content="Anonymous one-to-one text chat. No ads, no paywalls, no nonsense."
		/>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="alternate icon" href="/favicon.png" />

		<!-- Open Graph / Facebook / Slack / Discord link unfurl -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://omegle.lol" />
		<meta property="og:title" content="omegle.lol — anonymous one-to-one text chat" />
		<meta
			property="og:description"
			content="Two strangers, a blank page, a few minutes. No ads, no paywalls, no nonsense."
		/>
		<meta property="og:image" content="https://omegle.lol/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="omegle.lol — anonymous one-to-one text chat" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="omegle.lol — anonymous one-to-one text chat" />
		<meta
			name="twitter:description"
			content="Two strangers, a blank page, a few minutes. No ads, no paywalls, no nonsense."
		/>
		<meta name="twitter:image" content="https://omegle.lol/og-image.png" />

		<title>OMEGLE.LOL</title>
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
