name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      # Install from source rather than the prebuilt golangci-lint-action
      # binary: the published v1.62.2 release is built with go1.23, which
      # refuses to lint a go1.26 target ("Go language version used to build
      # golangci-lint is lower than the targeted Go version"). `go install`
      # rebuilds it with the toolchain set up above (go1.26), so the version
      # check passes. Matches how lefthook-validate and local dev install it.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2
      - name: Lint
        working-directory: backend
        run: golangci-lint run --timeout=5m ./...
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test
        working-directory: backend
        run: go test ./... -race -count=1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npx eslint . --max-warnings 0
      - name: Prettier
        working-directory: frontend
        run: npx prettier --check .
      - name: Stylelint
        working-directory: frontend
        run: npx stylelint '**/*.{css,svelte}' --max-warnings 0
      - name: svelte-check
        working-directory: frontend
        run: npx svelte-check --tsconfig ./tsconfig.json --threshold error
      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  lefthook-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install lefthook
        run: go install github.com/evilmartians/lefthook@v1.7.22
      - name: Run lefthook pre-commit on all files
        run: lefthook run pre-commit --all-files

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npx playwright test
        env:
          CI: '1'
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
