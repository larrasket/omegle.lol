run:
  timeout: 5m
  go: '1.26'
  tests: true

linters:
  disable-all: true
  enable:
    - bodyclose
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - gochecknoinits
    - gocognit
    - gocritic
    - gocyclo
    - gofumpt
    - goimports
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace

linters-settings:
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 20
  govet:
    enable:
      - shadow
  errcheck:
    check-type-assertions: true
    check-blank: false
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  exhaustive:
    default-signifies-exhaustive: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated
    disabled-checks:
      - hugeParam
      - rangeValCopy
  revive:
    rules:
      - name: var-naming
      - name: exported
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: range
      - name: receiver-naming
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
  dupl:
    threshold: 100
  nolintlint:
    require-explanation: true
    require-specific: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - dupl
        - errcheck
    - path: internal/metrics/metrics\.go
      linters:
        - gochecknoinits
    - path: internal/proto/messages\.go
      linters:
        - gochecknoinits
